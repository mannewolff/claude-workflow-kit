# SonarCloud-Konfiguration für claude-workflow-kit.
# projectKey/organization folgen SonarClouds Standard-Konvention <org>_<repo> (analog zu
# kanban-kit: mannewolff_kanban-kit) — noch nicht gegen die echte API verifiziert, da das
# Projekt erst per SonarCloud-UI importiert werden muss (Account-Aktion, siehe Issue #118).
# Nach dem Import gegenprüfen und ggf. anpassen, falls SonarCloud einen abweichenden Key
# vergeben hat.
sonar.projectKey=mannewolff_claude-workflow-kit
sonar.organization=mannewolff
sonar.projectName=claude-workflow-kit
sonar.host.url=https://sonarcloud.io

# --- Quellcode ---------------------------------------------------------------
# Nur die Node-Scripts des Kits, keine Skill-Markdown-Dateien, keine Doku-Sites.
sonar.sources=kit,install.mjs,tools

# Keine eigene Testsuite fuer die Node-Scripts vorhanden (siehe Hinweis unten) — daher
# keine sonar.tests-Angabe.
sonar.exclusions=node_modules/**,docs/**,docs-site/**,.idea/**,templates/**

# --- Coverage --------------------------------------------------------------
# Bewusst KEIN sonar.javascript.lcov.reportPaths gesetzt: kit/board.mjs, install.mjs und
# tools/*.mjs haben aktuell keine Testsuite, es gibt also keinen echten Coverage-Report.
# Ein Coverage-Wert ohne zugrunde liegende Tests waere vorgetaeuscht (siehe Issue #117,
# Leitplanke "Coverage-Gate ist ein Floor, kein Beweis"). Sobald eine Testsuite fuer die
# Node-Scripts existiert, hier den lcov-Report-Pfad ergaenzen.
